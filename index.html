<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>만다라트</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, 'Pretendard', 'Malgun Gothic', sans-serif; -webkit-font-smoothing: antialiased; }
      @media print {
        nav, header, .no-print { display: none !important; }
        main { padding: 0 !important; max-width: 100% !important; }
        body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      }

      /* === Apple-style animations === */
      @keyframes appleIn {
        from { opacity: 0; transform: scale(0.97) translateY(6px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes appleFadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes cloudPop {
        0%   { opacity: 0; transform: scale(0.6) rotate(var(--rot, 0deg)); }
        100% { opacity: 1; transform: scale(1) rotate(var(--rot, 0deg)); }
      }
      @keyframes cellPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,.2); }
        50%      { box-shadow: 0 0 0 5px rgba(99,102,241,.06); }
      }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes matrixIn {
        from { opacity: 0; transform: scale(0.96); }
        to   { opacity: 1; transform: scale(1); }
      }

      /* Cloud words */
      .cloud-word {
        transition: transform .25s cubic-bezier(.25,.46,.45,.94), opacity .2s;
      }
      .cloud-word:hover {
        transform: scale(1.12) rotate(var(--rot, 0deg)) !important;
        z-index: 2;
      }
      .cloud-trash { transition: all .2s cubic-bezier(.25,.46,.45,.94); }
      .cloud-trash:hover { color: #F43F5E !important; opacity: 1 !important; transform: scale(1.2); }

      /* Mandal cells */
      .mandal-cell {
        transition: box-shadow .2s, background .15s;
      }
      .mandal-cell:hover { z-index: 3; box-shadow: 0 0 0 2px rgba(99,102,241,.4); }

      /* Cell tooltip — hidden by default, shown on hover */
      .cell-tooltip {
        opacity: 0; transform: translateX(-50%) translateY(4px); pointer-events: none;
        transition: opacity .2s cubic-bezier(.25,.46,.45,.94), transform .2s cubic-bezier(.25,.46,.45,.94);
      }
      .mandal-cell-hover:hover .cell-tooltip {
        opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto;
      }
      .mandal-cell-hover:hover .cell-tooltip-trigger {
        opacity: 1 !important;
      }

      /* Sub-grid containers */
      .sub-grid-wrap {
        transition: box-shadow .3s cubic-bezier(.25,.46,.45,.94);
      }
      .sub-grid-wrap:hover { z-index: 2; box-shadow: 0 4px 16px rgba(0,0,0,.08); }
      .sub-grid {
        transition: box-shadow .25s;
      }

      /* Segment control */
      .seg-btn {
        transition: all .25s cubic-bezier(.25,.46,.45,.94);
        position: relative; z-index: 1;
      }

      /* Matrix zones */
      .matrix-zone {
        transition: background .2s cubic-bezier(.25,.46,.45,.94), box-shadow .2s;
      }
      .matrix-zone:hover { box-shadow: inset 0 0 0 2px rgba(99,102,241,.15); }

      /* Desktop sidebar responsive */
      @media (max-width: 768px) {
        .mandal-sidebar { display: none !important; }
        /* Mobile: mandal grid full width, horizontal scroll */
        .mandal-9x9-grid {
          min-width: 95vw !important;
          max-width: none !important;
          padding: 2px !important;
          gap: 4px !important;
        }
        .mandal-9x9-grid .sub-grid-wrap {
          padding: 3px !important;
        }
        .mandal-9x9-grid .sub-grid {
          gap: 2px !important;
        }
        .mandal-9x9-grid .mandal-cell {
          font-size: 9px !important;
        }
        .mandal-9x9-grid .mandal-cell span {
          font-size: 9px !important;
        }
        /* Mobile: allow horizontal scroll for mandal tab */
        .mandal-scroll-wrap {
          overflow-x: auto !important;
          -webkit-overflow-scrolling: touch;
          margin: 0 -16px;
          padding: 0 8px;
        }
      }
      @media (min-width: 769px) {
        .mandal-sidebar {
          position: sticky; top: 60px; max-height: calc(100vh - 80px); overflow-y: auto;
        }
      }

      /* Smooth scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
